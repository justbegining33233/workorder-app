<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FixTray – Hybrid Mobile Prototype</title>
<style>
:root {
  --bg: #0b0d12;
  --surface: #13161f;
  --border: #1f2330;
  --text: #e2e8f0;
  --muted: #4a5568;
  --muted2: #718096;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  padding: 24px 20px 40px;
}
.pg-head { text-align: center; margin-bottom: 28px; }
.pg-head h1 { font-size: 20px; font-weight: 800; }
.pg-head p { color: var(--muted2); font-size: 12px; margin-top: 5px; }

.role-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
.role-btn {
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--muted2); border-radius: 20px; padding: 7px 16px;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s;
}
.role-btn.active { color: #fff; }

.phone-outer { display: flex; justify-content: center; align-items: flex-start; gap: 32px; flex-wrap: wrap; }
.phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.phone-label { font-size: 11px; color: var(--muted2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }

.phone {
  width: 310px; height: 650px; background: #060709;
  border-radius: 44px; border: 3px solid #252833; overflow: hidden;
  position: relative; box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px #1a1d26;
}
.phone-notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 90px; height: 24px; background: #060709;
  border-radius: 0 0 16px 16px; z-index: 200;
}
.phone-screen { width: 100%; height: 100%; overflow: hidden; display: flex; flex-direction: column; position: relative; }

.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 28px 18px 4px; font-size: 10px; font-weight: 700; color: #fff;
  flex-shrink: 0; position: relative; z-index: 10;
}
.sb-right { display: flex; gap: 5px; align-items: center; }
.bat { width: 18px; height: 9px; border: 1.5px solid rgba(255,255,255,0.6); border-radius: 2px; padding: 1px; position: relative; }
.bat::after { content:''; position:absolute; right:-4px; top:1.5px; width:2.5px; height:5px; background:rgba(255,255,255,0.5); border-radius:1px; }
.bat-f { height:100%; width:70%; background:#22c55e; border-radius:1px; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px 8px; flex-shrink: 0;
  background: rgba(6,7,9,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 10;
}
.hdr-left { display: flex; align-items: center; gap: 8px; }
.hdr-menu {
  width: 34px; height: 34px; border-radius: 10px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; cursor: pointer; flex-shrink: 0; transition: background 0.15s;
}
.hdr-menu:hover { background: rgba(255,255,255,0.12); }
.hdr-title { font-size: 15px; font-weight: 800; }
.hdr-sub { font-size: 9px; color: var(--muted2); margin-top: 1px; }
.hdr-right { display: flex; align-items: center; gap: 6px; }
.hdr-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; flex-shrink: 0; border: 1.5px solid;
}

/* HOME TILES */
.home-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 10px 12px 80px; scrollbar-width: none;
}
.home-scroll::-webkit-scrollbar { display: none; }
.sec-label {
  font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted2); margin: 8px 0 6px;
}
.tile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.tile {
  border-radius: 16px; padding: 14px 12px 12px; cursor: pointer;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-between;
  min-height: 94px; transition: transform 0.15s, filter 0.15s;
  border: 1px solid rgba(255,255,255,0.04); -webkit-tap-highlight-color: transparent;
}
.tile:active { transform: scale(0.94); filter: brightness(1.15); }
.tile.span2 { grid-column: span 2; min-height: 72px; flex-direction: row; align-items: center; gap: 14px; }
.tile.span2 .t-ico { margin-bottom: 0; }
.t-ico { font-size: 24px; margin-bottom: 8px; }
.t-name { font-size: 11px; font-weight: 800; color: #fff; line-height: 1.3; }
.t-sub { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.t-badge {
  position: absolute; top: 8px; right: 8px;
  background: #ef4444; color: #fff; border-radius: 10px;
  font-size: 9px; font-weight: 800; padding: 1px 6px; min-width: 16px; text-align: center;
  border: 1.5px solid rgba(0,0,0,0.3);
}

/* SECTION VIEW */
.section-scroll { flex: 1; overflow-y: auto; padding: 0 12px 80px; scrollbar-width: none; }
.section-scroll::-webkit-scrollbar { display: none; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin: 8px 0 12px; }
.stat-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 10px 12px;
}
.stat-num { font-size: 20px; font-weight: 900; line-height: 1; }
.stat-lbl { font-size: 8px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted2); margin-top: 3px; }
.stat-chg { font-size: 9px; color: #22c55e; margin-top: 2px; }
.list-item {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 11px 12px; margin-bottom: 7px;
  display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.15s;
}
.list-item:active { background: rgba(255,255,255,0.07); }
.li-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
.li-body { flex: 1; min-width: 0; }
.li-title { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: 10px; color: var(--muted2); margin-top: 2px; }
.li-right { flex-shrink: 0; text-align: right; }
.li-status { font-size: 9px; font-weight: 700; border-radius: 8px; padding: 2px 7px; display: inline-block; }
.li-time { font-size: 9px; color: var(--muted2); margin-top: 3px; }

/* FOOTER NAV */
.footer-nav {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(6,7,9,0.97); backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 6px 4px 18px; display: flex; align-items: flex-end;
}
.fn-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 9px; font-weight: 600; color: var(--muted);
  cursor: pointer; padding: 4px 2px; transition: color 0.15s;
  position: relative; -webkit-tap-highlight-color: transparent;
}
.fn-item .fn-icon { font-size: 21px; transition: transform 0.15s; }
.fn-item.active { color: #fff; }
.fn-item.active .fn-icon { transform: scale(1.1); }
.fn-pip {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0; transition: opacity 0.15s;
}
.fn-item.active .fn-pip { opacity: 1; }
.fn-badge {
  position: absolute; top: 1px; right: calc(50% - 18px);
  background: #ef4444; color: #fff; font-size: 7px; font-weight: 800;
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; border: 1.5px solid #060709;
}
.fn-new {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent;
}
.fn-new-circle {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff; margin-top: -20px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.5); transition: transform 0.2s;
}
.fn-new-circle.rotated { transform: rotate(45deg); }
.fn-new-label { font-size: 9px; font-weight: 600; color: var(--muted2); }

/* NEW submenu */
.new-menu {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%) scale(0.9);
  background: #13161f; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px; padding: 12px; width: 200px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.7);
}
.new-menu.open { opacity: 1; pointer-events: all; transform: translateX(-50%) scale(1); }
.new-menu-title {
  font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted2); text-align: center; margin-bottom: 10px;
}
.new-opt {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 12px 14px; margin-bottom: 7px; cursor: pointer;
  transition: background 0.15s;
}
.new-opt:last-child { margin-bottom: 0; }
.new-opt:active { background: rgba(255,255,255,0.1); }
.no-ico { font-size: 22px; }
.no-title { font-size: 12px; font-weight: 700; }
.no-sub { font-size: 10px; color: var(--muted2); margin-top: 1px; }

/* DIM overlay */
.screen-dim {
  position: absolute; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 45; display: none;
}
.screen-dim.show { display: block; }

/* DRAWER */
.drawer-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 150; display: none;
}
.drawer-overlay.open { display: flex; }
.drawer {
  width: 240px; height: 100%; background: #0d0f16;
  border-right: 1px solid rgba(255,255,255,0.07);
  display: flex; flex-direction: column; overflow: hidden;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
.drawer-head { padding: 36px 14px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.drawer-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 8px;
}
.drawer-name { font-size: 13px; font-weight: 800; }
.drawer-role-lbl { font-size: 10px; color: var(--muted2); margin-top: 2px; }
.drawer-body { flex: 1; overflow-y: auto; padding: 6px 0; scrollbar-width: none; }
.drawer-body::-webkit-scrollbar { display: none; }
.drawer-sec { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); padding: 10px 14px 4px; }
.drawer-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; cursor: pointer; font-size: 12px; font-weight: 500;
  border-radius: 8px; margin: 1px 6px; transition: background 0.15s;
}
.drawer-item:hover { background: rgba(255,255,255,0.06); }
.di-ico { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
.di-badge { margin-left: auto; background: #ef4444; border-radius: 8px; font-size: 9px; font-weight: 800; padding: 1px 5px; color: #fff; }
.drawer-footer { padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.07); }
.drawer-out {
  display: flex; align-items: center; gap: 8px; font-size: 12px; color: #f87171;
  cursor: pointer; padding: 8px 6px; border-radius: 8px; transition: background 0.15s;
}
.drawer-out:hover { background: rgba(239,68,68,0.1); }

/* placeholder screen */
.empty-screen {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px; padding: 20px; text-align: center;
}
</style>
</head>

let role = 'shop';

function setRole(r, btn) {
  role = r;
  document.querySelectorAll('.role-btn').forEach(b => { b.classList.remove('active'); b.style.cssText=''; });
  const d = R[r];
  btn.classList.add('active');
  btn.style.background = d.color+'22'; btn.style.borderColor = d.color; btn.style.color = d.color;
  render();
}

function render() {
  buildPhone('screen1', true, null);
  buildPhone('screen2', false, null);
  document.getElementById('labelB').textContent = 'Section View — tap a tile ←';
}

function buildPhone(id, isHome, sectionKey) {
  const d = R[role];
  const el = document.getElementById(id);
  const sec = sectionKey ? d.sections?.[sectionKey] : null;

  el.innerHTML =
    statusBar() +
    header(d, !!sec, sec?.title) +
    (isHome ? homeContent(d) : (sec ? sectionContent(sec, d.color) : emptyContent())) +
    footer(d) +
    drawer(d);

  // NEW button
  el.querySelectorAll('.fn-new').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const menu = el.querySelector('.new-menu');
      const fab  = el.querySelector('.fn-new-circle');
      const dim  = el.querySelector('.screen-dim');
      const open = menu.classList.toggle('open');
      fab.classList.toggle('rotated', open);
      dim.classList.toggle('show', open);
    });
  });
  // dismiss dim
  const dim = el.querySelector('.screen-dim');
  if (dim) dim.addEventListener('click', () => {
    el.querySelector('.new-menu')?.classList.remove('open');
    el.querySelector('.fn-new-circle')?.classList.remove('rotated');
    dim.classList.remove('show');
  });
  // new option close
  el.querySelectorAll('.new-opt').forEach(opt => {
    opt.addEventListener('click', e => {
      e.stopPropagation();
      el.querySelector('.new-menu')?.classList.remove('open');
      el.querySelector('.fn-new-circle')?.classList.remove('rotated');
      dim?.classList.remove('show');
    });
  });
  // drawer
  el.querySelectorAll('.drawer-trigger').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      el.querySelector('.drawer-overlay').classList.add('open');
    });
  });
  el.querySelector('.drawer-overlay')?.addEventListener('click', () => {
    el.querySelector('.drawer-overlay').classList.remove('open');
  });
  el.querySelector('.drawer')?.addEventListener('click', e => e.stopPropagation());
  el.querySelector('.drawer-out')?.addEventListener('click', () => {
    el.querySelector('.drawer-overlay').classList.remove('open');
  });
  // tile taps (only on phone 1)
  if (isHome) {
    el.querySelectorAll('.tile').forEach(tile => {
      tile.addEventListener('click', () => {
        const sec = tile.dataset.sec;
        buildPhone('screen2', false, sec);
        const d2 = R[role];
        const secData = d2.sections?.[sec];
        document.getElementById('labelB').textContent = secData ? secData.title : sec;
      });
    });
  }
  // back button
  el.querySelector('.back-btn')?.addEventListener('click', () => {
    buildPhone('screen2', false, null);
    document.getElementById('labelB').textContent = 'Section View — tap a tile ←';
    // re-attach for new phone2
    const el2 = document.getElementById('screen2');
    el2.querySelector('.drawer-overlay')?.addEventListener('click', () => el2.querySelector('.drawer-overlay').classList.remove('open'));
  });
}

function statusBar() {
  return `<div class="status-bar"><span>9:41</span><div class="sb-right"><span>●●●●</span><div class="bat"><div class="bat-f"></div></div></div></div>`;
}

function header(d, showBack, title) {
  if (showBack) {
    return `<div class="app-header">
      <div class="hdr-left">
        <div class="hdr-menu back-btn" style="font-size:16px">←</div>
        <div><div class="hdr-title">${title}</div></div>
      </div>
      <div class="hdr-right">
        <div class="hdr-avatar" style="background:${d.color}18;border-color:${d.color}55;color:${d.color}">${d.ico}</div>
      </div>
    </div>`;
  }
  return `<div class="app-header">
    <div class="hdr-left">
      <div class="hdr-menu drawer-trigger">🔧</div>
      <div><div class="hdr-title">FixTray</div><div class="hdr-sub">${d.rl}</div></div>
    </div>
    <div class="hdr-right">
      <div class="hdr-avatar" style="background:${d.color}18;border-color:${d.color}55;color:${d.color}">${d.ico}</div>
    </div>
  </div>`;
}

function homeContent(d) {
  const tiles = d.tiles.map(t =>
    `<div class="tile${t.span2?' span2':''}" data-sec="${t.sec}"
      style="background:${t.bg};border-color:rgba(255,255,255,0.04)">
      ${t.badge?`<div class="t-badge">${t.badge}</div>`:''}
      <div class="t-ico">${t.ico}</div>
      <div><div class="t-name">${t.name}</div><div class="t-sub">${t.sub}</div></div>
    </div>`
  ).join('');
  return `<div class="home-scroll"><div class="sec-label">Quick Access</div><div class="tile-grid">${tiles}</div></div>`;
}

function sectionContent(sec, color) {
  const stats = sec.stats.map(s =>
    `<div class="stat-card"><div class="stat-num" style="color:${color}">${s.n}</div><div class="stat-lbl">${s.l}</div><div class="stat-chg">${s.c}</div></div>`
  ).join('');
  const items = sec.items.map(i =>
    `<div class="list-item">
      <div class="li-icon">${i.ico}</div>
      <div class="li-body"><div class="li-title">${i.t}</div><div class="li-sub">${i.s}</div></div>
      <div class="li-right"><div class="li-status" style="background:${i.sc}22;color:${i.sc}">${i.sl}</div><div class="li-time">${i.ti}</div></div>
    </div>`
  ).join('');
  return `<div class="section-scroll"><div class="stats-row">${stats}</div><div class="sec-label">Recent</div>${items}</div>`;
}

function emptyContent() {
  return `<div class="empty-screen"><div style="font-size:40px;opacity:0.15">👆</div><div style="font-size:12px;font-weight:700;color:#1e2230">Tap a tile on the left</div><div style="font-size:10px;color:#151820;margin-top:4px">Section opens here</div></div>`;
}

function footer(d) {
  const items = d.footer.map(f => {
    if (f === 'NEW') {
      const opts = d.newOpts.map(o =>
        `<div class="new-opt"><div class="no-ico">${o.ico}</div><div><div class="no-title">${o.title}</div><div class="no-sub">${o.sub}</div></div></div>`
      ).join('');
      return `<div class="fn-new">
        <div class="fn-new-circle" style="background:${d.color}">＋</div>
        <span class="fn-new-label">New</span>
        <div class="new-menu">
          <div class="new-menu-title">Create New</div>
          ${opts}
        </div>
      </div>`;
    }
    return `<div class="fn-item${f.active?' active':''}">
      <div class="fn-pip"></div>
      <div class="fn-icon">${f.ico}</div>
      <span>${f.lbl}</span>
      ${f.badge?`<div class="fn-badge">${f.badge}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="screen-dim"></div><div class="footer-nav">${items}</div>`;
}

function drawer(d) {
  const secs = d.drawer.map(sec =>
    `<div class="drawer-sec">${sec.t}</div>` +
    sec.items.map(i =>
      `<div class="drawer-item"><span class="di-ico">${i.ico}</span><span>${i.lbl}</span>${i.badge?`<span class="di-badge">${i.badge}</span>`:''}</div>`
    ).join('')
  ).join('');
  return `<div class="drawer-overlay">
    <div class="drawer">
      <div class="drawer-head">
        <div class="drawer-avatar" style="background:${d.color}22;border:1.5px solid ${d.color}55;color:${d.color}">${d.ico}</div>
        <div class="drawer-name">${d.name}</div>
        <div class="drawer-role-lbl">${d.rl}</div>
      </div>
      <div class="drawer-body">${secs}</div>
      <div class="drawer-footer"><div class="drawer-out">🚪 Sign Out</div></div>
    </div>
  </div>`;
}

// Init
render();
document.querySelector('[data-role="shop"]').style.cssText = 'background:#f59e0b22;border-color:#f59e0b;color:#f59e0b';
