<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FixTray</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020608;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 2rem; font-weight: 700; color: #e5332a; margin-bottom: 1rem; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(229,51,42,0.3);
      border-top-color: #e5332a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .offline-msg { display: none; margin-top: 1.5rem; color: #94a3b8; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div>
    <div class="logo">FixTray</div>
    <p>Loading&hellip;</p>
    <div class="spinner"></div>
    <p class="offline-msg" id="offline">
      Unable to connect. Please check your internet connection and try again.
    </p>
  </div>
  <script>
    // If the remote app doesn't load within 8 seconds, show offline message
    setTimeout(function () {
      document.getElementById('offline').style.display = 'block';
    }, 8000);
  </script>
</body>
</html>
