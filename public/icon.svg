<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d27"/>
      <stop offset="100%" stop-color="#080e1c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,240)" fill="none" stroke="#e5332a" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wrench body -->
    <line x1="-60" y1="60" x2="60" y2="-60"/>
    <!-- Wrench head top -->
    <path d="M60,-60 L90,-80 Q110,-55 90,-35 L60,-60"/>
    <!-- Wrench head bottom -->
    <path d="M-60,60 L-90,80 Q-110,55 -90,35 L-60,60"/>
  </g>
  <!-- FT text -->
  <text x="256" y="380" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="80" fill="#ffffff" letter-spacing="-2">FT</text>
</svg>
