# Railway Deployment Configuration for FixTray
# Runs Next.js + Socket.IO together on one server.
# See: https://docs.railway.app/reference/config-as-code
#
# Required environment variables (set in Railway dashboard):
#   DATABASE_URL          — Neon PostgreSQL connection string
#   JWT_SECRET            — Must match value used for signing tokens
#   NODE_ENV              — production
#   NEXT_PUBLIC_APP_URL   — https://your-app.up.railway.app (or custom domain)
#   CRON_SECRET           — Secret for Vercel-style cron auth
#   (all other Vercel env vars as needed)

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
