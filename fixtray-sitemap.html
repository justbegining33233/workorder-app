<title>FixTray – App Structure Visual Map</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d26;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #64748b;
    --customer: #06b6d4;
    --shop: #f59e0b;
    --tech: #10b981;
    --manager: #8b5cf6;
    --admin: #ef4444;
    --superadmin: #f97316;
    --auth: #3b82f6;
    --public: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    padding: 24px;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); margin-bottom: 28px; font-size: 13px; }

  /* Legend */
  .legend {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer;
    transition: opacity 0.2s;
  }
  .legend-item.hidden { opacity: 0.3; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Grid of role sections */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  /* Role card */
  .role-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .role-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  .role-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .role-header .role-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .role-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
  .role-header .count {
    font-size: 11px; color: var(--muted);
    background: rgba(255,255,255,0.05);
    border-radius: 10px; padding: 2px 8px;
  }
  .role-header .chevron { color: var(--muted); transition: transform 0.2s; font-size: 12px; }
  .role-header.collapsed .chevron { transform: rotate(-90deg); }

  /* Page tree */
  .page-tree {
    padding: 8px 0;
    max-height: 2000px;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .page-tree.collapsed { max-height: 0; padding: 0; }

  .tree-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 16px;
    border-radius: 6px;
    cursor: default;
    transition: background 0.15s;
  }
  .tree-item:hover { background: rgba(255,255,255,0.04); }
  .tree-item .path {
    font-size: 12px; color: var(--muted); font-family: monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }
  .tree-item .label {
    font-size: 12px; color: var(--text); flex: 1.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tree-item .tag {
    font-size: 10px; border-radius: 4px; padding: 1px 6px;
    background: rgba(255,255,255,0.07); color: var(--muted);
    flex-shrink: 0;
  }
  .tree-item .tag.dynamic { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .tree-item .tag.protected { background: rgba(239,68,68,0.15); color: #ef4444; }
  .tree-item .tag.public { background: rgba(107,114,128,0.15); color: #9ca3af; }

  /* Divider inside tree */
  .tree-group-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted);
    padding: 8px 16px 4px;
  }
  .tree-divider { height: 1px; background: var(--border); margin: 4px 12px; }

  /* Search */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .search-bar input:focus { border-color: #3b82f6; }
  .search-bar input::placeholder { color: var(--muted); }

  /* Stats bar */
  .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { color: var(--muted); font-size: 12px; }
  .stat strong { color: var(--text); }

  /* Highlight search match */
  .highlight { background: rgba(59,130,246,0.3); border-radius: 2px; padding: 0 2px; }

  /* Hidden by filter */
  .role-card.filtered { display: none; }
  .tree-item.filtered { display: none; }
</style>

  { role: 'superadmin', path: '/superadmin/settings', label: 'Settings', tags: ['protected'] },
  { role: 'superadmin', path: '/superadmin/profile', label: 'Profile', tags: ['protected'] },

  // ── SHARED WORK ORDERS ────────────────────────────────────────────────────
  { role: 'shop', path: '/workorders/list', label: 'Work Orders List', tags: ['protected'] },
  { role: 'shop', path: '/workorders/new', label: 'New Work Order', tags: ['protected'] },
  { role: 'shop', path: '/workorders/inshop', label: 'In-Shop Queue', tags: ['protected'] },
  { role: 'shop', path: '/workorders/:id', label: 'Work Order Detail', tags: ['protected', 'dynamic'] },
];

// ─── Render ─────────────────────────────────────────────────────────────────

function buildPage() {
  const grid = document.getElementById('grid');
  const legendEl = document.getElementById('legend');

  // Build legend
  Object.entries(ROLES).forEach(([key, role]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.role = key;
    item.innerHTML = `<div class="dot" style="background:${role.color}"></div><span>${role.icon} ${role.label}</span>`;
    item.addEventListener('click', () => toggleRole(key, item));
    legendEl.appendChild(item);
  });

  // Build role cards
  Object.entries(ROLES).forEach(([key, role]) => {
    const pages = PAGES.filter(p => p.role === key);
    if (!pages.length) return;

    const card = document.createElement('div');
    card.className = 'role-card';
    card.dataset.role = key;

    const header = document.createElement('div');
    header.className = 'role-header';
    header.innerHTML = `
      <div class="role-dot" style="background:${role.color}"></div>
      <h2>${role.icon} ${role.label}</h2>
      <span class="count">${pages.length} pages</span>
      <span class="chevron">▾</span>
    `;
    header.addEventListener('click', () => {
      header.classList.toggle('collapsed');
      tree.classList.toggle('collapsed');
    });

    const tree = document.createElement('div');
    tree.className = 'page-tree';

    pages.forEach(p => {
      const item = document.createElement('div');
      item.className = 'tree-item';
      item.dataset.path = p.path.toLowerCase();
      item.dataset.label = p.label.toLowerCase();

      const tagHtml = p.tags.map(t => `<span class="tag ${t}">${t}</span>`).join(' ');

      item.innerHTML = `
        <span class="label">${p.label}</span>
        <span class="path">${p.path}</span>
        ${tagHtml}
      `;
      tree.appendChild(item);
    });

    card.appendChild(header);
    card.appendChild(tree);
    grid.appendChild(card);
  });

  // Update stats
  document.getElementById('totalCount').textContent = PAGES.length;
  document.getElementById('dynamicCount').textContent = PAGES.filter(p => p.tags.includes('dynamic')).length;
  document.getElementById('protectedCount').textContent = PAGES.filter(p => p.tags.includes('protected')).length;
}

const hiddenRoles = new Set();
function toggleRole(key, legendItem) {
  if (hiddenRoles.has(key)) {
    hiddenRoles.delete(key);
    legendItem.classList.remove('hidden');
  } else {
    hiddenRoles.add(key);
    legendItem.classList.add('hidden');
  }
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();

  document.querySelectorAll('.role-card').forEach(card => {
    const role = card.dataset.role;
    if (hiddenRoles.has(role)) {
      card.classList.add('filtered');
      return;
    }
    card.classList.remove('filtered');

    // Apply search within items
    let anyVisible = false;
    card.querySelectorAll('.tree-item').forEach(item => {
      const matchPath = item.dataset.path.includes(q);
      const matchLabel = item.dataset.label.includes(q);
      if (!q || matchPath || matchLabel) {
        item.classList.remove('filtered');
        anyVisible = true;
      } else {
        item.classList.add('filtered');
      }
    });

    if (q && !anyVisible) {
      card.classList.add('filtered');
    }
  });
}

document.getElementById('searchInput').addEventListener('input', applyFilters);

buildPage();
</script>
</body>
</html>
